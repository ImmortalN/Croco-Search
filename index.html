<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск по гайдам Crocoblock</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f7f9;
      margin: 0;
      padding: 0;
    }
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      background: white;
      box-shadow: 0 0 20px rgba(0,0,0,0.08);
    }
    .chat-header {
      padding: 16px 20px;
      background: #007cba;
      color: white;
      font-size: 18px;
      font-weight: 600;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .message {
      margin-bottom: 16px;
      display: flex;
    }
    .message.user {
      justify-content: flex-end;
    }
    .message-content {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.45;
    }
    .user .message-content {
      background: #007cba;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bot .message-content {
      background: #f0f2f5;
      color: #111;
      border-bottom-left-radius: 4px;
    }
    .input-area {
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      border-top: 1px solid #eee;
      background: white;
    }
    input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 15px;
      outline: none;
    }
    button {
      padding: 12px 24px;
      background: #007cba;
      color: white;
      border: none;
      border-radius: 24px;
      font-weight: 500;
      cursor: pointer;
    }
    button:disabled {
      background: #a0cfff;
      cursor: not-allowed;
    }
    .popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .popup-content {
      background: white;
      padding: 32px;
      border-radius: 16px;
      width: 360px;
      max-width: 90%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .popup-content h2 {
      margin: 0;
      text-align: center;
    }
    .popup-content input {
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    #loginError {
      color: #d32f2f;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }
    .result-source {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 4px;
      display: block;
    }
    .result-link {
      color: #0066cc;
      font-weight: 600;
      text-decoration: none;
    }
    .result-link:hover {
      text-decoration: underline;
    }
    .snippet {
      color: #555;
      font-size: 13px;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <!-- Попап логина -->
  <div id="loginPopup" class="popup">
    <div class="popup-content">
      <h2>Вход в поиск</h2>
      <input type="text" id="loginUser" placeholder="Логин" autocomplete="username" />
      <input type="password" id="loginPass" placeholder="Пароль" autocomplete="current-password" />
      <label class="remember">
        <input type="checkbox" id="rememberMe" checked />
        Запомнить меня (7 дней)
      </label>
      <button id="loginBtn">Войти</button>
      <p id="loginError"></p>
    </div>
  </div>

  <!-- Основной контейнер поиска (скрыт до логина) -->
  <div class="chat-container" id="chatContainer" style="display: none;">
    <div class="chat-header">Поиск по гайдам, статьям и задачам</div>
    <div id="chat" class="chat-messages"></div>
    <div class="input-area">
      <input type="text" id="question" placeholder="Например: jetengine dynamic visibility" autocomplete="off" />
      <button id="askBtn">Найти</button>
    </div>
  </div>

  <script>
    const loginPopup = document.getElementById('loginPopup');
    const chatContainer = document.getElementById('chatContainer');
    const chatDiv = document.getElementById('chat');
    const input = document.getElementById('question');
    const askBtn = document.getElementById('askBtn');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    const STORAGE_KEY = 'crocoSearchAuth';
    const STORAGE_EXPIRE_KEY = 'crocoSearchExpire';

    // Проверяем, залогинен ли пользователь
    function checkAuth() {
      const authData = localStorage.getItem(STORAGE_KEY);
      const expire = localStorage.getItem(STORAGE_EXPIRE_KEY);
      const now = Date.now();

      if (authData && expire && now < Number(expire)) {
        loginPopup.style.display = 'none';
        chatContainer.style.display = 'flex';
        addMessage('Добро пожаловать обратно! Задавайте вопрос.', false);
        return true;
      }
      // истёк или нет данных → показываем логин
      loginPopup.style.display = 'flex';
      chatContainer.style.display = 'none';
      return false;
    }

    // Добавляем сообщение в чат
    function addMessage(content, isUser = false) {
      const msg = document.createElement('div');
      msg.className = `message ${isUser ? 'user' : 'bot'}`;
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.innerHTML = content;
      msg.appendChild(contentDiv);
      chatDiv.appendChild(msg);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    // Логика отправки вопроса
    async function handleSearch() {
      const q = input.value.trim();
      if (!q) return;

      addMessage(q, true);
      input.value = '';
      askBtn.disabled = true;

      const loader = document.createElement('div');
      loader.className = 'message bot';
      loader.innerHTML = '<div class="message-content">Ищу...</div>';
      chatDiv.appendChild(loader);
      chatDiv.scrollTop = chatDiv.scrollHeight;

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q })
        });

        if (!res.ok) {
          throw new Error('Сервер вернул ошибку');
        }

        const data = await res.json();
        loader.remove();
        addMessage(data.answer || 'Результатов нет.', false);
      } catch (err) {
        loader.remove();
        addMessage('Ошибка соединения. Попробуйте позже.', false);
      } finally {
        askBtn.disabled = false;
        input.focus();
      }
    }

    // Обработка логина
    loginBtn.addEventListener('click', async () => {
      const username = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value.trim();
      const remember = document.getElementById('rememberMe').checked;

      if (!username || !password) {
        loginError.textContent = 'Заполните логин и пароль';
        return;
      }

      loginError.textContent = '';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, remember })
        });

        const data = await res.json();

        if (data.success) {
          // Сохраняем флаг авторизации
          localStorage.setItem(STORAGE_KEY, 'true');

          // Устанавливаем срок действия (7 дней или навсегда)
          if (remember) {
            const expire = Date.now() + 7 * 24 * 60 * 60 * 1000;
            localStorage.setItem(STORAGE_EXPIRE_KEY, expire);
          } else {
            // без remember — до закрытия браузера (localStorage всё равно живёт)
            localStorage.removeItem(STORAGE_EXPIRE_KEY);
          }

          loginPopup.style.display = 'none';
          chatContainer.style.display = 'flex';
          addMessage('Успешный вход! Задавайте вопрос.', false);
          input.focus();
        } else {
          loginError.textContent = 'Неверный логин или пароль';
        }
      } catch (err) {
        loginError.textContent = 'Ошибка соединения с сервером';
      }
    });

    // События
    askBtn.addEventListener('click', handleSearch);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !askBtn.disabled) handleSearch();
    });

    // Проверка при загрузке страницы
    window.addEventListener('load', () => {
      checkAuth();
    });
  </script>
</body>
</html>
