<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Base</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginPopup" class="popup">
  <div class="popup-content">
    <h2>Авторизация</h2>
    <input id="loginUser" type="text" placeholder="Логин">
    <input id="loginPass" type="password" placeholder="Пароль">
    <button id="loginBtn" onclick="login()">Войти</button>
    <div id="loginError" class="error"></div>
  </div>
</div>

<div class="container" id="app" style="display:none;">
  <header>
    <h1>База знаний</h1>
  </header>

  <div class="sync-panel">
    <div class="progress-box">
      <div class="bar-container">
        <div id="progressBar" class="bar-fill"></div>
      </div>
      <div id="statusLabel" class="status-label">Инициализация...</div>
    </div>
    <button class="sync-btn" onclick="startSync()">🔄 Обновить базу</button>
  </div>

  <div class="search-area">
    <input id="searchInput" type="text" placeholder="Поиск по всем гайдам (напр. JetEngine)...">
    <button id="searchBtn" onclick="search()">Найти</button>
  </div>

  <div id="results" class="results-grid"></div>
</div>

<script>
const STORAGE_KEY = 'kb_auth';
const resultsDiv = document.getElementById('results');
const searchInput = document.getElementById('searchInput');

// --- ЛОГИКА ВХОДА ---
async function login() {
  const user = document.getElementById('loginUser').value;
  const pass = document.getElementById('loginPass').value;
  const errorDiv = document.getElementById('loginError');

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username: user, password: pass })
    });
    const data = await res.json();
    
    if (data.success) {
      localStorage.setItem(STORAGE_KEY, '1');
      initApp();
    } else {
      errorDiv.innerText = 'Неверные данные';
    }
  } catch (e) {
    errorDiv.innerText = 'Ошибка сервера';
  }
}

// --- ЗАПУСК ПРИЛОЖЕНИЯ ---
function initApp() {
  document.getElementById('loginPopup').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  searchInput.focus();
  startStatusPolling();
}

// --- МОНИТОРИНГ СИНХРОНИЗАЦИИ ---
function startStatusPolling() {
  const bar = document.getElementById('progressBar');
  const label = document.getElementById('statusLabel');

  setInterval(async () => {
    try {
      const res = await fetch('/sync-status');
      const data = await res.json();
      
      bar.style.width = data.percent + '%';
      label.innerText = `${data.progress} (${data.percent}%)`;
      
      // Авто-старт если база пуста
      if (!data.loading && data.percent === 0) {
        fetch('/sync');
      }
    } catch (e) {
      console.log('Статус недоступен');
    }
  }, 2000); // Опрашиваем чуть реже, чтобы не грузить сеть
}

async function startSync() {
  await fetch('/sync');
}

// --- ПОИСК ---
async function search() {
  const query = searchInput.value.trim();
  if (!query) return;
  
  resultsDiv.innerHTML = '<div class="loading">Ищу...</div>';
  
  try {
    const res = await fetch('/ask', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ question: query })
    });
    
    const data = await res.json();
    resultsDiv.innerHTML = '';

    if (!data.results || data.results.length === 0) {
      resultsDiv.innerHTML = '<p class="no-results">Ничего не найдено по этому запросу.</p>';
      return;
    }

    data.results.forEach(item => {
      let typeLabel = 'Публичный';
      if (item.source === 'internal') typeLabel = 'Внутренний';
      if (item.source === 'external') typeLabel = 'Сайт (Guide)';

      const card = document.createElement('div');
      card.className = `card card-${item.source}`;
      card.innerHTML = `
        <span class="badge badge-${item.source}">${typeLabel}</span>
        <a href="${item.url}" target="_blank">${item.title || 'Без заголовка'}</a>
        <p>${(item.body || '').substring(0, 160)}...</p>
      `;
      resultsDiv.appendChild(card);
    });
  } catch (e) {
    resultsDiv.innerHTML = '<p class="error">Ошибка при поиске. Попробуйте позже.</p>';
  }
}

// Поиск по Enter
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    search();
  }
});

// Проверка сессии при загрузке
if (localStorage.getItem(STORAGE_KEY)) {
  initApp();
}
</script>
</body>
</html>
