<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Поиск по базе знаний</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f7fa;
      color: #111;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
    }

    /* Поиск */
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-box input {
      flex: 1;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .search-box button {
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      background: #0066ff;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .search-box button:disabled {
      background: #9bbcff;
      cursor: not-allowed;
    }

    /* Sync кнопка */
    .sync-btn {
      margin-bottom: 20px;
      background: #111;
    }

    /* Loader */
    .loader {
      text-align: center;
      padding: 20px;
      color: #555;
    }

    /* Результаты */
    .results {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result {
      background: white;
      padding: 14px;
      border-radius: 10px;
      border-left: 4px solid #0066ff;
    }

    .result small {
      color: #777;
      font-size: 11px;
      text-transform: uppercase;
    }

    .result a {
      display: block;
      margin: 4px 0;
      color: #0066cc;
      font-weight: 600;
      text-decoration: none;
    }

    .result a:hover {
      text-decoration: underline;
    }

    .snippet {
      font-size: 13px;
      color: #555;
    }

    /* Логин */
    .popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .popup-content {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .popup-content input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .error {
      color: red;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginPopup" class="popup">
  <div class="popup-content">
    <h2>Вход</h2>
    <input id="loginUser" placeholder="Логин"/>
    <input id="loginPass" type="password" placeholder="Пароль"/>
    <button id="loginBtn">Войти</button>
    <div id="loginError" class="error"></div>
  </div>
</div>

<!-- 🔍 APP -->
<div class="container" id="app" style="display:none;">

  <h1>Поиск по базе знаний</h1>

  <div class="search-box">
    <input id="input" placeholder="Например: jetengine dynamic visibility"/>
    <button id="searchBtn">Найти</button>
  </div>

  <button class="search-box sync-btn" onclick="startSync()">🔄 Обновить базу</button>

  <div id="status" class="loader"></div>

  <div id="results" class="results"></div>

</div>

<script>
const loginPopup = document.getElementById('loginPopup');
const app = document.getElementById('app');
const results = document.getElementById('results');
const statusDiv = document.getElementById('status');

const STORAGE_KEY = 'auth';

// 🔐 Проверка логина
function checkAuth() {
  if (localStorage.getItem(STORAGE_KEY)) {
    loginPopup.style.display = 'none';
    app.style.display = 'block';
  }
}

// 🔐 Логин
document.getElementById('loginBtn').onclick = async () => {
  const username = loginUser.value;
  const password = loginPass.value;

  const res = await fetch('/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem(STORAGE_KEY, '1');
    checkAuth();
  } else {
    loginError.textContent = 'Неверные данные';
  }
};

// 🔍 Поиск
async function search() {
  const q = input.value.trim();
  if (!q) return;

  // ❗ очищаем старые результаты
  results.innerHTML = '';
  statusDiv.textContent = 'Ищу...';

  const res = await fetch('/ask', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ question: q })
  });

  const data = await res.json();

  statusDiv.textContent = '';

  results.innerHTML = data.answer;
}

// ⏳ Sync
async function startSync() {
  results.innerHTML = '';
  statusDiv.textContent = '⏳ Синхронизация...';

  await fetch('/sync');

  const interval = setInterval(async () => {
    const res = await fetch('/sync-status');
    const data = await res.json();

    statusDiv.textContent = data.progress;

    if (!data.loading) {
      clearInterval(interval);
      statusDiv.textContent = '✅ Готово!';
    }
  }, 1000);
}

// Enter
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});

searchBtn.onclick = search;

checkAuth();
</script>

</body>
</html>
