<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Knowledge Base</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginPopup" class="popup">
  <div class="popup-content">
    <h2>Авторизация</h2>
    <input id="loginUser" placeholder="Логин">
    <input id="loginPass" type="password" placeholder="Пароль">
    <button onclick="login()">Войти</button>
    <div id="loginError" class="error"></div>
  </div>
</div>

<div class="container" id="app" style="display:none;">
  <header>
    <h1>База знаний</h1>
  </header>

  <div class="sync-panel">
    <div class="progress-box">
      <div class="bar-container">
        <div id="progressBar" class="bar-fill"></div>
      </div>
      <div id="statusLabel" class="status-label">Проверка базы...</div>
    </div>
    <button class="sync-btn" onclick="startSync()">🔄 Обновить</button>
  </div>

  <div class="search-area">
    <input id="searchInput" placeholder="Поиск по всем гайдам...">
    <button onclick="search()">Найти</button>
  </div>

  <div id="results" class="results-grid"></div>
</div>

<script>
const STORAGE_KEY = 'kb_auth';

async function login() {
  const res = await fetch('/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ username: loginUser.value, password: loginPass.value })
  });
  const data = await res.json();
  if (data.success) {
    localStorage.setItem(STORAGE_KEY, '1');
    initApp();
  } else {
    loginError.innerText = 'Ошибка';
  }
}

function initApp() {
  loginPopup.style.display = 'none';
  app.style.display = 'block';
  startStatusPolling();
}

async function startStatusPolling() {
  setInterval(async () => {
    const res = await fetch('/sync-status');
    const data = await res.json();
    
    progressBar.style.width = data.percent + '%';
    statusLabel.innerText = `${data.progress} (${data.percent}%)`;
    
    // Если сервер ничего не делает и база пустая - запускаем
    if (!data.loading && data.percent === 0) {
      fetch('/sync');
    }
  }, 1000);
}

async function startSync() {
  await fetch('/sync');
}

async function search() {
  const q = searchInput.value.trim();
  if (!q) return;
  
  results.innerHTML = 'Загрузка...';
  const res = await fetch('/ask', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ question: q })
  });
  const data = await res.json();
  
  results.innerHTML = '';
  if (!data.results.length) {
    results.innerHTML = 'Ничего не найдено';
    return;
  }

  data.results.forEach(item => {
    let type = item.source === 'internal' ? 'Внутренний' : (item.source === 'external' ? 'Сайт' : 'Публичный');
    results.innerHTML += `
      <div class="card card-${item.source}">
        <span class="badge badge-${item.source}">${type}</span>
        <a href="${item.url}" target="_blank">${item.title}</a>
        <p>${item.body.substring(0, 140)}...</p>
      </div>`;
  });
}

searchInput.onkeydown = (e) => e.key === 'Enter' && search();

if (localStorage.getItem(STORAGE_KEY)) initApp();
</script>
</body>
</html>
