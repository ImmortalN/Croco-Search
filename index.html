<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Base</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginPopup" class="popup">
  <div class="popup-content">
    <h2>Login</h2>
    <input id="loginUser" type="text" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <button id="loginSubmitBtn">Sign In</button>
    <div id="loginError" class="error"></div>
  </div>
</div>

<div class="container" id="app" style="display:none; opacity: 0; transition: opacity 0.5s;">
  <header>
    <h1>Knowledge Base</h1>
  </header>

  <div class="sync-panel">
    <div class="progress-box">
      <div class="bar-container">
        <div id="progressBar" class="bar-fill"></div>
      </div>
      <div id="statusLabel" class="status-label">Initializing...</div>
    </div>
    <button class="sync-btn" id="refreshBtn">🔄 Refresh Base</button>
  </div>

  <div class="search-area">
    <input id="searchInput" type="text" placeholder="Search guides (e.g. JetEngine)..." autocomplete="off">
    <button id="searchBtn">Search</button>
  </div>

  <div id="results" class="results-grid"></div>
</div>

<script>
const STORAGE_KEY = 'kb_auth';
const loginPopup = document.getElementById('loginPopup');
const appContainer = document.getElementById('app');
const searchInput = document.getElementById('searchInput');

// --- AUTH LOGIC ---
async function login() {
  const user = document.getElementById('loginUser').value;
  const pass = document.getElementById('loginPass').value;
  const errorDiv = document.getElementById('loginError');

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username: user, password: pass })
    });
    const data = await res.json();
    
    if (data.success) {
      localStorage.setItem(STORAGE_KEY, '1');
      showApp();
    } else {
      errorDiv.innerText = 'Invalid credentials';
    }
  } catch (e) {
    errorDiv.innerText = 'Server error';
  }
}

function showApp() {
  loginPopup.style.visibility = 'hidden'; // Полностью убираем видимость
  loginPopup.style.display = 'none';      // Убираем из потока
  appContainer.style.display = 'block';
  setTimeout(() => {
    appContainer.style.opacity = '1';
    searchInput.focus(); // Принудительный фокус для ввода
  }, 50);
  startStatusPolling();
}

// --- SYNC MONITORING ---
function startStatusPolling() {
  setInterval(async () => {
    try {
      const res = await fetch('/sync-status');
      const data = await res.json();
      document.getElementById('progressBar').style.width = data.percent + '%';
      document.getElementById('statusLabel').innerText = `${data.progress} (${data.percent}%)`;
      if (!data.loading && data.percent === 0) fetch('/sync');
    } catch (e) {}
  }, 2000);
}

// --- SEARCH LOGIC ---
async function handleSearch() {
  const query = searchInput.value.trim();
  if (!query) return;

  const resultsDiv = document.getElementById('results');
  resultsDiv.innerHTML = '<div class="loading">Searching...</div>';

  try {
    const res = await fetch('/ask', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ question: query })
    });
    const data = await res.json();
    resultsDiv.innerHTML = '';

    if (!data.results || data.results.length === 0) {
      resultsDiv.innerHTML = '<p class="no-results">No results found.</p>';
      return;
    }

    data.results.forEach(item => {
      let typeLabel = 'Public';
      if (item.source === 'internal') typeLabel = 'Internal';
      if (item.source === 'external') typeLabel = 'Website (Guide)';

      const card = document.createElement('div');
      card.className = `card card-${item.source}`;
      card.innerHTML = `
        <span class="badge badge-${item.source}">${typeLabel}</span>
        <a href="${item.url}" target="_blank">${item.title}</a>
        <p>${(item.body || '').substring(0, 160)}...</p>
      `;
      resultsDiv.appendChild(card);
    });
  } catch (e) {
    resultsDiv.innerHTML = '<p class="error">Search failed.</p>';
  }
}

// EVENT LISTENERS
document.getElementById('loginSubmitBtn').onclick = login;
document.getElementById('searchBtn').onclick = handleSearch;
document.getElementById('refreshBtn').onclick = () => fetch('/sync');
searchInput.onkeydown = (e) => e.key === 'Enter' && handleSearch();

// RE-AUTH CHECK
if (localStorage.getItem(STORAGE_KEY)) {
  showApp();
}
</script>
</body>
</html>
