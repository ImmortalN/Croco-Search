<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Интерком чат</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <h2>Чат по гайдам Intercom</h2>
    <div id="chat"></div>
    <input type="text" id="question" placeholder="Введите вопрос..." />
    <button id="askBtn">Спросить</button>
  </div>

  <script>
    const chatDiv = document.getElementById('chat');
    const input = document.getElementById('question');
    const btn = document.getElementById('askBtn');

    btn.addEventListener('click', async () => {
      const question = input.value;
      if (!question) return;

      chatDiv.innerHTML += `<p><strong>Вы:</strong> ${question}</p>`;
      input.value = '';

      const res = await fetch('/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({question})
      });
      const data = await res.json();
      chatDiv.innerHTML += `<p><strong>Ответ:</strong> ${data.answer}</p>`;
      chatDiv.scrollTop = chatDiv.scrollHeight;
    });
  </script>
</body>
</html>
