<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск по гайдам Crocoblock</title>
  <style>
    /* Базовые стили для проверки отображения */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f9; }
    .chat-container { display: flex; flex-direction: column; height: 90vh; max-width: 800px; margin: 20px auto; background: white; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #eee; }
    .message { margin-bottom: 15px; display: flex; }
    .message.user { justify-content: flex-end; }
    .message-content { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
    .user .message-content { background: #007cba; color: white; border-bottom-right-radius: 2px; }
    .bot .message-content { background: #f0f2f5; color: #1c1e21; border-bottom-left-radius: 2px; }
    
    /* Стили для результатов поиска */
    .search-results-container { width: 100%; }
    .result-item { border-bottom: 1px solid #ddd; padding: 10px 0; }
    .result-item:last-child { border-bottom: none; }
    .result-link { color: #0066cc; text-decoration: none; font-weight: bold; display: inline-block; margin-bottom: 4px; }
    .result-link:hover { text-decoration: underline; }
    .result-source { font-size: 11px; color: #777; text-transform: uppercase; margin-bottom: 5px; }
    
    .input-area { padding: 20px; display: flex; gap: 10px; }
    input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
    button { padding: 10px 20px; background: #007cba; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button:disabled { background: #ccc; }
    
    .popup { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .popup-content { background: white; padding: 30px; border-radius: 12px; display: flex; flex-direction: column; gap: 15px; }
  </style>
</head>
<body>

  <div id="loginPopup" class="popup">
    <div class="popup-content">
      <h2>Вход</h2>
      <input type="text" id="loginUser" placeholder="Логин" />
      <input type="password" id="loginPass" placeholder="Пароль" />
      <button id="loginBtn">Войти</button>
      <p id="loginError" style="color: red; font-size: 12px;"></p>
    </div>
  </div>

  <div class="chat-container" id="chatContainer" style="display: none;">
    <div class="chat-header" style="padding: 15px; background: #007cba; color: white; border-radius: 12px 12px 0 0;">
      <h2 style="margin:0; font-size: 18px;">Поиск по ресурсам</h2>
    </div>
    <div id="chat" class="chat-messages"></div>
    <div class="input-area">
      <input type="text" id="question" placeholder="Напр: Filter by author" autocomplete="off" />
      <button id="askBtn">Поиск</button>
    </div>
  </div>

  <script>
    const chatDiv = document.getElementById('chat');
    const input = document.getElementById('question');
    const askBtn = document.getElementById('askBtn');
    const chatContainer = document.getElementById('chatContainer');

    // 1. Управление сообщениями
    function addMessage(content, isUser = false) {
      const msgWrapper = document.createElement('div');
      msgWrapper.className = `message ${isUser ? 'user' : 'bot'}`;
      
      const msgContent = document.createElement('div');
      msgContent.className = 'message-content';

      if (isUser) {
        msgContent.textContent = content;
      } else {
        // Ключевой момент: вставляем как HTML
        msgContent.innerHTML = content;
      }
      
      msgWrapper.appendChild(msgContent);
      chatDiv.appendChild(msgWrapper);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    // 2. Логика отправки
    async function handleSend() {
      const q = input.value.trim();
      if (!q || askBtn.disabled) return;

      addMessage(q, true);
      input.value = '';
      askBtn.disabled = true;

      // Лоадер
      const loader = document.createElement('div');
      loader.className = 'message bot';
      loader.innerHTML = '<div class="message-content">Ищу...</div>';
      chatDiv.appendChild(loader);

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q })
        });
        const data = await res.json();
        
        loader.remove();
        // Рендерим полученный HTML-ответ
        addMessage(data.answer || 'Ничего не найдено.');
      } catch (e) {
        loader.remove();
        addMessage('Ошибка связи с сервером.');
      } finally {
        askBtn.disabled = false;
        input.focus();
      }
    }

    // 3. Авторизация (упрощенно)
    document.getElementById('loginBtn').addEventListener('click', () => {
      // Здесь ваша логика fetch('/login')
      document.getElementById('loginPopup').style.display = 'none';
      chatContainer.style.display = 'flex';
    });

    askBtn.addEventListener('click', handleSend);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSend(); });
  </script>
</body>
</html>
