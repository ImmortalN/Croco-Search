<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Knowledge Base</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginPopup" class="popup">
  <div class="popup-content">
    <h2>Login</h2>
    <input id="loginUser" type="text" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Sign In</button>
    <div id="loginError" class="error"></div>
  </div>
</div>

<div class="container" id="app" style="display:none;">
  <header>
    <h1>Knowledge Base</h1>
  </header>

  <div class="sync-panel">
    <div class="progress-box">
      <div class="bar-container">
        <div id="progressBar" class="bar-fill"></div>
      </div>
      <div id="statusLabel" class="status-label">Initializing...</div>
    </div>
    <button class="sync-btn" onclick="startSync()">🔄 Refresh Base</button>
  </div>

  <div class="search-area">
    <input id="searchInput" type="text" placeholder="Search guides (e.g. JetEngine)...">
    <button onclick="search()">Search</button>
  </div>

  <div id="results" class="results-grid"></div>
</div>

<script>
const STORAGE_KEY = 'kb_auth';

async function login() {
  const user = document.getElementById('loginUser').value;
  const pass = document.getElementById('loginPass').value;
  const res = await fetch('/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ username: user, password: pass })
  });
  const data = await res.json();
  if (data.success) { localStorage.setItem(STORAGE_KEY, '1'); initApp(); }
  else { document.getElementById('loginError').innerText = 'Invalid credentials'; }
}

function initApp() {
  document.getElementById('loginPopup').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('searchInput').focus();
  startStatusPolling();
}

function startStatusPolling() {
  setInterval(async () => {
    try {
      const res = await fetch('/sync-status');
      const data = await res.json();
      document.getElementById('progressBar').style.width = data.percent + '%';
      document.getElementById('statusLabel').innerText = `${data.progress} (${data.percent}%)`;
      if (!data.loading && data.percent === 0) fetch('/sync');
    } catch (e) {}
  }, 2000);
}

async function startSync() { await fetch('/sync'); }

async function search() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;
  const resultsDiv = document.getElementById('results');
  resultsDiv.innerHTML = '<div class="loading">Searching...</div>';
  
  const res = await fetch('/ask', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ question: query })
  });
  const data = await res.json();
  resultsDiv.innerHTML = '';

  if (!data.results.length) {
    resultsDiv.innerHTML = '<p class="no-results">No results found.</p>';
    return;
  }

  data.results.forEach(item => {
    let typeLabel = 'Public';
    if (item.source === 'internal') typeLabel = 'Internal';
    if (item.source === 'external') typeLabel = 'Website (Guide)';

    const card = document.createElement('div');
    card.className = `card card-${item.source}`;
    card.innerHTML = `
      <span class="badge badge-${item.source}">${typeLabel}</span>
      <a href="${item.url}" target="_blank">${item.title}</a>
      <p>${item.body.substring(0, 160)}...</p>
    `;
    resultsDiv.appendChild(card);
  });
}

document.getElementById('searchInput').onkeydown = (e) => e.key === 'Enter' && search();
if (localStorage.getItem(STORAGE_KEY)) initApp();
</script>
</body>
</html>
